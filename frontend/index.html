<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#08080c;color:#d4d4e0;
 height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none}
.screen{display:none;height:100vh}
.screen.active{display:flex}

/* ===== LAUNCHER ===== */
#launcher{flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative}
#launcher .header{display:flex;align-items:center;gap:14px;margin-bottom:10px}
#launcher h1{font-size:30px;font-weight:800;letter-spacing:-1px;
 background:linear-gradient(135deg,#fff 0%,#a0a0b0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.gh-link{color:#555;transition:color .2s,transform .2s;display:flex;align-items:center;margin-left:4px;cursor:pointer}
.gh-link:hover{color:#fff;transform:scale(1.15)}
.subtitle{font-size:13px;color:#555;margin-bottom:36px;margin-top:16px;letter-spacing:2px;text-transform:uppercase}
.title-gif{width:46px;height:46px;border-radius:12px;object-fit:cover;box-shadow:0 0 20px rgba(236,72,153,0.3)}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:22px;max-width:900px;padding:0 24px}
.card{width:148px;border-radius:18px;background:linear-gradient(145deg,#141418 0%,#1a1a22 100%);
 border:1.5px solid rgba(255,255,255,0.06);cursor:pointer;
 transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);overflow:hidden;
 display:flex;flex-direction:column;align-items:center;position:relative}
.card::before{content:'';position:absolute;inset:0;border-radius:18px;
 background:radial-gradient(circle at 50% 0%,rgba(74,222,128,0.3) 0%,transparent 70%);
 opacity:0;transition:opacity 0.3s ease;pointer-events:none}
.card:hover{transform:translateY(-8px) scale(1.03);border-color:var(--accent);
 box-shadow:0 12px 40px rgba(0,0,0,0.6),0 0 24px var(--glow),inset 0 1px 0 rgba(255,255,255,0.08)}
.card:hover::before{opacity:1}
.card:active{transform:translateY(-3px) scale(1.01);transition-duration:0.1s}
.card-img{width:100%;height:105px;object-fit:cover;border-bottom:1px solid rgba(255,255,255,0.05);transition:filter 0.3s ease}
.card:hover .card-img{filter:brightness(1.1) saturate(1.1)}
.card-name{padding:14px 10px;font-size:14px;font-weight:600;text-align:center;letter-spacing:0.5px;color:#ccc;transition:color 0.3s ease}
.card:hover .card-name{color:#fff}

/* ===== PLATFORM SCREENS ===== */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid #333;border-top-color:var(--accent,#4ade80);border-radius:50%;
 animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

#platform-login{flex-direction:column;align-items:center;justify-content:center;gap:16px;position:relative;
 background:#0d0d1a;background-image:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.06) 0%,transparent 60%),
 radial-gradient(ellipse at 80% 50%,rgba(236,72,153,0.06) 0%,transparent 60%)}
#platform-login h1{font-size:28px;color:#fff;letter-spacing:-0.5px;font-weight:700}
#platform-login .sub{font-size:13.5px;color:#8888a0;margin-bottom:4px}
#platform-login input{width:340px;padding:12px 14px;border:1px solid #252540;border-radius:10px;
 background:#13132a;color:#fff;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
#platform-login input:focus{border-color:var(--accent,#4ade80);box-shadow:0 0 0 3px rgba(74,222,128,0.07)}
.btn-login{width:340px;padding:12px;border:none;border-radius:10px;margin-top:2px;
 background:linear-gradient(135deg,#4ade80,#22d3ee);color:#0d0d1a;
 font-size:14.5px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;
 display:inline-flex;align-items:center;justify-content:center}
.btn-login:hover{opacity:.9}.btn-login:active{transform:scale(.985)}
.btn-login:disabled{opacity:.35;cursor:default;transform:none}
#platform-login .status{font-size:13px;min-height:22px;display:flex;align-items:center;justify-content:center}
.st-err{color:#ff6b6b}.st-info{color:#8888a0}
.lang-wrap{position:absolute;top:18px;right:22px}
.lang-sel{background:#13132a;color:#8888a0;border:1px solid #252540;border-radius:8px;
 padding:5px 10px;font-size:12px;cursor:pointer;outline:none}
.lang-sel option{background:#13132a;color:#d4d4e0}

#platform-courses{flex-direction:column;padding:24px 28px 20px;gap:12px;background:#0d0d1a}
.header-row{display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-row h2{flex:1;font-size:20px;color:#fff;font-weight:600}
.toolbar{display:flex;gap:8px;flex-shrink:0;align-items:stretch}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:#555;display:flex;align-items:center}
.search-icon svg{width:15px;height:15px}
.search{width:100%;padding:9px 14px 9px 36px;border:1px solid #252540;border-radius:10px;
 background:#13132a;color:#fff;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.search:focus{border-color:var(--accent,#4ade80);box-shadow:0 0 0 3px rgba(74,222,128,0.07)}
.folder-row{display:flex;align-items:center;gap:10px;padding:8px 14px;
 background:#13132a;border:1px solid #1a1a30;border-radius:10px;flex-shrink:0}
.folder-row .folder-path{flex:1;font-size:12.5px;color:#8888a0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-row .folder-label{font-size:12px;color:#666;white-space:nowrap;display:flex;align-items:center;gap:6px}
.folder-row .folder-label svg{width:14px;height:14px;opacity:.6}
.list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;padding:2px 0 50px}
.list::-webkit-scrollbar{width:5px}.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:#252540;border-radius:4px}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.item{display:flex;align-items:center;gap:14px;padding:12px 14px;
 background:#13132a;border:1px solid transparent;border-radius:12px;flex-shrink:0;
 transition:background .15s,border-color .15s;animation:fadeSlideIn .25s ease both}
.item:hover{background:#161630;border-color:#1e1e3a}
.item.downloaded-item{border-left:3px solid rgba(74,222,128,0.25)}
.item.partial-item{border-left:3px solid rgba(255,180,50,0.4)}
.item.active-dl{border-left:3px solid var(--accent,#4ade80);border-color:rgba(74,222,128,0.19)}
.item .no-thumb{width:52px;height:52px;border-radius:8px;background:#1a1a30;
 display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item .no-thumb svg{width:22px;height:22px;color:#333}
.item img.thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#1a1a30;flex-shrink:0}
.item .info{flex:1;min-width:0}
.item .name{font-weight:600;font-size:13.5px;color:#eee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.item .meta{font-size:11.5px;color:#777;margin-top:2px;display:flex;align-items:center;gap:6px}
.badge-done{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;
 background:rgba(74,222,128,0.08);color:var(--accent,#4ade80);border:1px solid rgba(74,222,128,0.15);display:inline-flex;align-items:center;gap:3px}
.badge-partial{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;
 background:rgba(255,180,50,0.08);color:#ffb432;border:1px solid rgba(255,180,50,0.15);display:inline-flex;align-items:center;gap:3px}
.item .prog-area{margin-top:8px;display:none}
.item .prog-area.visible{display:block}
.minibar{height:6px;background:#1e1e35;border-radius:3px;overflow:hidden;width:100%}
.minibar-fill{height:100%;border-radius:3px;transition:width .3s ease;width:0%;background:#4ade80}
.minibar-fill.done{background:#4ade80}
.minibar-fill.cancelled{background:#ff6b6b}
.prog-text{font-size:11px;color:#777;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acts{display:flex;gap:6px;flex-shrink:0;align-items:center}
.b{padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;border:none;white-space:nowrap;
 font-weight:500;transition:all .15s;min-height:32px;display:inline-flex;align-items:center}
.b-dl{background:linear-gradient(135deg,#4ade80,#22d3ee);color:#0d0d1a;font-weight:600}
.b-dl:hover{opacity:.85}.b-dl:active{transform:scale(.96)}
.b-dl:disabled{opacity:.2;cursor:default;transform:none}
.b-cancel{background:#ff6b6b0e;color:#ff6b6b;border:1px solid #ff6b6b20}
.b-open{background:transparent;color:#8888a0;border:1px solid #2a2a40}
.b-open:hover{color:#ccc;border-color:#444}
.b-folder{background:#1a1a30;color:#bbb;border:1px solid #2a2a40;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s}
.b-folder:hover{background:#222240;color:#fff}
.b-logout{background:transparent;border:1px solid #2a2a40;border-radius:8px;padding:5px 8px;
 cursor:pointer;color:#777;display:flex;align-items:center;transition:all .15s}
.b-logout:hover{color:#ff6b6b;border-color:#ff6b6b40}
.b-back{position:fixed;bottom:20px;left:20px;z-index:99999;width:36px;height:36px;border-radius:50%;
 border:none;background:rgba(255,255,255,0.07);color:#888;font-size:18px;cursor:pointer;
 display:flex;align-items:center;justify-content:center;transition:all .25s;backdrop-filter:blur(8px);
 box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.b-back:hover{background:var(--accent,#4ade80);color:#0d0d1a;transform:scale(1.1);box-shadow:0 0 16px rgba(74,222,128,0.4)}
.item .sel-check{width:16px;height:16px;accent-color:var(--accent,#4ade80);cursor:pointer;flex-shrink:0;margin:0}
.sel-bar{display:none;position:fixed;bottom:0;left:0;right:0;
 background:#13132aee;backdrop-filter:blur(12px);border-top:1px solid #252540;padding:12px 28px;
 align-items:center;gap:12px;z-index:10}
.sel-bar.visible{display:flex}
.sel-bar .sel-count{font-size:13px;color:#ccc;flex:1}
.sel-bar .b-sel-dl{background:linear-gradient(135deg,#4ade80,#22d3ee);color:#0d0d1a;font-weight:600;
 padding:8px 20px;border-radius:8px;border:none;font-size:13px;cursor:pointer}
.sel-bar .b-sel-clear{background:transparent;color:#888;border:1px solid #333;
 padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer}
.b-sel-all{background:#1a1a30;color:#999;border:1px solid #252540;padding:6px 12px;border-radius:8px;
 font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.b-sel-all.active{background:rgba(74,222,128,0.08);color:var(--accent,#4ade80);border-color:rgba(74,222,128,0.25)}
.header-sub{font-size:12px;color:#666;font-weight:400;margin-left:2px}
.no-results{padding:32px 20px;text-align:center;color:#555;font-size:13.5px;display:none}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
 padding:48px 20px;color:#555;gap:10px;text-align:center}
.empty-state svg{width:40px;height:40px;opacity:.3;margin-bottom:4px}

.modal{border:none;background:#1a1a30;color:#e0e0e0;border-radius:14px;padding:28px;
 max-width:400px;width:90%;box-shadow:0 20px 60px #00000080}
.modal::backdrop{background:#00000088}
.modal h3{font-size:16px;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.modal h3 svg{color:#fbbf24;flex-shrink:0}
.modal p{font-size:13.5px;color:#999;line-height:1.6;margin-bottom:20px}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.modal-acts button{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.modal-cancel{background:transparent;color:#888;border:1px solid #333}
.modal-confirm{background:linear-gradient(135deg,#4ade80,#22d3ee);color:#0d0d1a;border:none;font-weight:600}

.sg-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;margin-top:12px}
.sg-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;
 background:#13132a;border:1px solid #252540;cursor:pointer;color:#ddd;font-size:14px;
 transition:all .15s;text-align:left;width:100%}
.sg-item:hover{background:#1e1e3a;border-color:var(--accent,#4ade80)}
.sg-img{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0}
.sg-name{flex:1;font-weight:500}

.mini-dl{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
 background:#161630;border:1px solid #252540;border-radius:12px;padding:10px 16px;
 min-width:320px;max-width:420px;cursor:pointer;z-index:100;
 backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:all .2s}
.mini-dl:hover{border-color:var(--mini-accent,#4ade80);box-shadow:0 4px 24px rgba(0,0,0,0.6)}
.mini-dl.visible{display:flex;align-items:center;gap:12px}
.mini-dl-icon{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0}
.mini-dl-info{flex:1;min-width:0}
.mini-dl-name{font-size:12px;font-weight:600;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-dl-detail{font-size:11px;color:#777;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-dl-bar{height:5px;background:#1e1e35;border-radius:2px;margin-top:4px;overflow:hidden;width:100%}
.mini-dl-fill{height:100%;border-radius:2px;transition:width .3s ease;width:0%;background:#4ade80}
/* ===== DEPS STATUS BAR ===== */
.deps-bar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
 display:flex;gap:10px;align-items:center;opacity:0;transition:opacity .4s ease}
.deps-bar.loaded{opacity:1}
.dep-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
 border-radius:20px;font-size:11px;font-weight:500;letter-spacing:0.3px;
 border:1px solid;white-space:nowrap;cursor:default}
.dep-ok{background:rgba(74,222,128,0.07);color:#4ade80;border-color:rgba(74,222,128,0.2)}
.dep-err{background:rgba(255,107,107,0.07);color:#ff6b6b;border-color:rgba(255,107,107,0.2);
 cursor:pointer;transition:background .15s}
.dep-err:hover{background:rgba(255,107,107,0.14)}
.dep-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
/* ===== SETUP SCREEN ===== */
#setup-screen{flex-direction:column;align-items:center;justify-content:center;gap:28px}
.setup-card{background:#0f0f1a;border:1px solid #1e1e35;border-radius:20px;
 padding:32px 36px;width:380px;display:flex;flex-direction:column;gap:16px}
.setup-title{font-size:20px;font-weight:700;color:#fff;text-align:center;letter-spacing:-0.3px}
.setup-subtitle{font-size:13px;color:#555;text-align:center;line-height:1.5;margin-top:4px}
.setup-dep{display:flex;flex-direction:column;gap:8px;padding:14px;
 background:#13132a;border:1px solid #252540;border-radius:12px;
 transition:border-color .3s}
.setup-dep.dep-done{border-color:rgba(74,222,128,0.2)}
.setup-dep.dep-error{border-color:rgba(255,107,107,0.25)}
.setup-dep-head{display:flex;align-items:center;justify-content:space-between}
.setup-dep-name{font-size:13px;font-weight:600;color:#ccc}
.setup-dep-badge{font-size:11px;color:#666}
.setup-bar{height:5px;background:#1e1e35;border-radius:3px;overflow:hidden}
.setup-bar-fill{height:100%;border-radius:3px;width:0%;
 background:linear-gradient(90deg,#4ade80,#22d3ee);transition:width .25s ease}
.setup-bar-fill.err{background:#ff6b6b}
.setup-err-msg{font-size:11.5px;color:#ff6b6b;line-height:1.5;white-space:pre-wrap}
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen" class="screen active" style="background:#08080c">
 <div class="setup-card">
  <div>
   <div class="setup-title" id="setup-title">Checking dependencies...</div>
   <div class="setup-subtitle" id="setup-subtitle">Verifying yt-dlp and ffmpeg</div>
  </div>
  <div id="setup-dep-ytdlp" class="setup-dep">
   <div class="setup-dep-head">
    <span class="setup-dep-name">yt-dlp</span>
    <span class="setup-dep-badge" id="setup-badge-ytdlp">Waiting...</span>
   </div>
   <div class="setup-bar"><div class="setup-bar-fill" id="setup-fill-ytdlp"></div></div>
   <div class="setup-err-msg" id="setup-err-ytdlp" style="display:none"></div>
  </div>
  <div id="setup-dep-ffmpeg" class="setup-dep">
   <div class="setup-dep-head">
    <span class="setup-dep-name">ffmpeg</span>
    <span class="setup-dep-badge" id="setup-badge-ffmpeg">Waiting...</span>
   </div>
   <div class="setup-bar"><div class="setup-bar-fill" id="setup-fill-ffmpeg"></div></div>
   <div class="setup-err-msg" id="setup-err-ffmpeg" style="display:none"></div>
  </div>
 </div>
</div>

<!-- ===== LAUNCHER SCREEN ===== -->
<div id="launcher" class="screen">
 <div class="header">
  <img class="title-gif" src="assets/images/angry.gif" onerror="this.style.display='none'">
  <h1>vintecinco_dl</h1>
  <span class="gh-link" title="GitHub" onclick="window.runtime.BrowserOpenURL('https://github.com/owbryd/vintecinco_dl')">
   <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </span>
 </div>
 <p class="subtitle">select a platform</p>
 <div class="grid">
  <div class="card" style="--accent:#ff90e8;--glow:#ff90e840" onclick="selectPlatform('gumroad','Gumroad','#ff90e8')">
   <img class="card-img" src="assets/images/gumroad.png" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Gumroad</div>
  </div>
  <div class="card" style="--accent:#00c16e;--glow:#00c16e40" onclick="selectPlatform('kiwify','Kiwify','#00c16e')">
   <img class="card-img" src="assets/images/kiwify.jpg" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Kiwify</div>
  </div>
  <div class="card" style="--accent:#e6ff32;--glow:#e6ff3240" onclick="selectPlatform('teachable','Teachable','#e6ff32')">
   <img class="card-img" src="assets/images/teachable.jpg" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Teachable</div>
  </div>
  <div class="card" style="--accent:#f04e23;--glow:#f04e2340" onclick="selectPlatform('hotmart','Hotmart','#f04e23')">
   <img class="card-img" src="assets/images/hotmart.jpg" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Hotmart</div>
  </div>
  <div class="card" style="--accent:#2e91fc;--glow:#2e91fc40" onclick="selectPlatform('kajabi','Kajabi','#2e91fc')">
   <img class="card-img" src="assets/images/kajabi.png" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Kajabi</div>
  </div>
  <div class="card" style="--accent:#e0b467;--glow:#e0b46740" onclick="selectPlatform('skool','Skool','#e0b467')">
   <img class="card-img" src="assets/images/skool.png" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Skool</div>
  </div>
  <div class="card" style="--accent:#e80a89;--glow:#e80a8940" onclick="selectPlatform('pluralsight','Pluralsight','#e80a89')">
   <img class="card-img" src="assets/images/pluralsight.webp" onerror="this.style.background='#1a1a30'">
   <div class="card-name">Pluralsight</div>
  </div>

// ===== INIT & DEPS SETUP =====
function updateSetupDep(name, pct, done, errMsg){
 const key=name==='yt-dlp'?'ytdlp':'ffmpeg';
 const card=document.getElementById('setup-dep-'+key);
 const fill=document.getElementById('setup-fill-'+key);
 const badge=document.getElementById('setup-badge-'+key);
 const errEl=document.getElementById('setup-err-'+key);
 if(errMsg){
  fill.className='setup-bar-fill err';fill.style.width='100%';
  badge.textContent='Error';badge.style.color='#ff6b6b';
  card.classList.add('dep-error');
  errEl.textContent=errMsg;errEl.style.display='block';
 }else if(done){
  fill.style.width='100%';
  badge.textContent='✓ Ready';badge.style.color='#4ade80';
  card.classList.add('dep-done');
 }else{
  fill.style.width=pct+'%';
  badge.textContent=Math.round(pct)+'%';badge.style.color='#8888a0';
 }
}

function updateDepsBar(deps){
 function pill(id,name,ok,url){
  const el=document.getElementById(id);
  if(!el)return;
  el.className='dep-pill '+(ok?'dep-ok':'dep-err');
  el.innerHTML='<span class="dep-dot"></span>'+name+(ok?' ✓':' ✗');
  if(!ok){el.title='Click to install';el.onclick=()=>window.runtime.BrowserOpenURL(url);}
 }
 pill('dep-ytdlp','yt-dlp',deps.ytdlp,'https://github.com/yt-dlp/yt-dlp#installation');
 pill('dep-ffmpeg','ffmpeg',deps.ffmpeg,'https://ffmpeg.org/download.html');
 document.getElementById('deps-bar').classList.add('loaded');
}

(async function initApp(){
 let deps;
 try{ deps=await window.go.main.App.CheckDeps(); }catch(e){ deps={ytdlp:false,ffmpeg:false}; }

 const needDownload=!deps.ytdlp||!deps.ffmpeg;

 if(needDownload){
  // Update title to show we're actually installing
  document.getElementById('setup-title').textContent='Setting up vintecinco_dl';
  document.getElementById('setup-subtitle').textContent='Downloading required tools. This only happens once.';
 }

 // Mark already-installed deps immediately
 if(deps.ytdlp) updateSetupDep('yt-dlp',100,true,null);
 if(deps.ffmpeg) updateSetupDep('ffmpeg',100,true,null);

 if(needDownload){
  // Register progress listener before calling EnsureDeps
  window.runtime.EventsOn('dep_progress',(d)=>{
   updateSetupDep(d.name, d.percent||0, d.done||false, d.error||null);
  });
  try{
   await window.go.main.App.EnsureDeps();
  }catch(err){
   // Error (e.g. Linux ffmpeg) — wait so user can read the message
   await new Promise(r=>setTimeout(r,2000));
  }
  window.runtime.EventsOff('dep_progress');
  deps=await window.go.main.App.CheckDeps();
 }

 // Brief pause so user sees the ✓ confirms before launcher appears
 await new Promise(r=>setTimeout(r,needDownload?600:400));
 showScreen('launcher');
 updateDepsBar(deps);
})();

function showScreen(id){

 document.getElementById(id).classList.add('active');

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function setAccentColors(hex){
 const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
 const s=document.documentElement.style;
 s.setProperty('--accent',hex);
 s.setProperty('--accent-rgb',r+','+g+','+b);
 const lr=Math.min(255,r+Math.round((255-r)*0.45));
 const lg=Math.min(255,g+Math.round((255-g)*0.45));
 const lb=Math.min(255,b+Math.round((255-b)*0.45));
 const light='rgb('+lr+','+lg+','+lb+')';
 s.setProperty('--accent-light',light);
 let ds=document.getElementById('dyn-accent');
 if(!ds){ds=document.createElement('style');ds.id='dyn-accent';document.head.appendChild(ds)}
 const rgb=r+','+g+','+b;
 ds.textContent=
  '.btn-login,.b-dl,.b-sel-dl,.modal-confirm{background:linear-gradient(135deg,'+hex+','+light+')!important}'+
  '.card::before{background:radial-gradient(circle at 50% 0%,rgba('+rgb+',0.3) 0%,transparent 70%)!important}'+
  '#platform-login input:focus{border-color:'+hex+'!important;box-shadow:0 0 0 3px rgba('+rgb+',0.07)!important}'+
  '.search:focus{border-color:'+hex+'!important;box-shadow:0 0 0 3px rgba('+rgb+',0.07)!important}'+
  '.item.downloaded-item{border-left:3px solid rgba('+rgb+',0.25)!important}'+
  '.item.active-dl{border-left:3px solid '+hex+'!important;border-color:rgba('+rgb+',0.19)!important}'+
  '.dl-badge{background:rgba('+rgb+',0.08)!important;color:'+hex+'!important;border:1px solid rgba('+rgb+',0.15)!important}'+
  '.b-back:hover{background:'+hex+'!important;box-shadow:0 0 16px rgba('+rgb+',0.4)!important}'+
  '.b-sel-all.active{background:rgba('+rgb+',0.08)!important;color:'+hex+'!important;border-color:rgba('+rgb+',0.25)!important}'+
  '.minibar-fill{background:'+hex+'!important}'+
  '.mini-dl-fill{background:'+hex+'!important}'+
  '.mini-dl:hover{border-color:'+hex+'!important}';
}

async function doLogin(){
 const emailEl=document.getElementById('email');
 const passEl=document.getElementById('password');
 const btn=document.getElementById('btn-login');
 let loginEmail='',loginPass='';

 if(activePlatform==='hotmart'||activePlatform==='pluralsight'||activePlatform==='masterclass'){
  loginEmail=emailEl.value.trim();
  if(!loginEmail)return;
  loginPass='';
 }else if(activePlatform==='thinkific'){
  loginEmail=emailEl.value.trim();
  loginPass='';
  if(!loginEmail)return;
 }else if(activePlatform==='teachable'||activePlatform==='kajabi'){
  if(loginStep==='credentials'){
   loginEmail=emailEl.value.trim();
   if(!loginEmail)return;
   loginPass='';
  }else{
   loginEmail='';
   loginPass=passEl.value.trim();
   if(!loginPass)return;
  }
 }else{
  loginEmail=emailEl.value.trim();
  loginPass=passEl.value.trim();
  if(!loginEmail||!loginPass)return;
 }

 btn.disabled=true;
 btn.innerHTML='<span class="spinner"></span>'+esc(t('authenticating'));
 setStatus('','info');

 try{
  const result=await window.go.main.App.Login(loginEmail,loginPass);

  if(result.otp_sent){
   loginStep='otp';
   otpEmail=emailEl.value.trim();
   emailEl.style.display='none';
   passEl.style.display='';
   passEl.type='text';
   passEl.placeholder=t('otp_code');
   passEl.value='';
   passEl.focus();
   btn.disabled=false;
   btn.textContent=t('verify_otp');
   setStatus(t('otp_sent_msg'),'info');
   return;
  }

  if(result.success){
   btn.innerHTML='&#10003; '+esc(t('authenticating').replace('...',''));
   setStatus('','info');
   await new Promise(r=>setTimeout(r,400));
   await loadCoursesAndShow(result);
  }else{
   setStatus(result.error||t('auth_fail'),'err');
   btn.disabled=false;
   btn.textContent=loginStep==='otp'?t('verify_otp'):
    activePlatform==='hotmart'?t('login'):
    activePlatform==='thinkific'?t('login'):
    (activePlatform==='teachable'||activePlatform==='kajabi')?t('send_otp'):t('login');
  }
 }catch(err){
  setStatus(t('auth_fail'),'err');
  btn.disabled=false;
  btn.textContent=t('login');
 }
}

async function cancelAndStartNew(){
 document.getElementById('dlg-conflict').close();
 const indices=pendingDlIndices;pendingDlIndices=null;
 if(!indices||!indices.length)return;
 const oldDlPlatform=dlPlatform;
 await window.go.main.App.Cancel();
 if(oldDlPlatform&&sessions[oldDlPlatform])sessions[oldDlPlatform].dl={index:-1,status:'idle'};
 // Wait for old download goroutine to finish (max 10s safety timeout)
 const t0=Date.now();
 await new Promise(r=>{
  const check=()=>{if(!batchRunning||Date.now()-t0>10000){r()}else{setTimeout(check,80)}};
  setTimeout(check,80);
 });
 // Ensure Go side has correct platform before starting download
 dlPlatform=activePlatform;
 try{await window.go.main.App.SelectPlatform(activePlatform)}catch(e){}
 window.go.main.App.Download(indices);
}
function startDownload(oi){
 if(batchRunning){showConflictDlg([oi]);return}
 dlPlatform=activePlatform;
 window.go.main.App.Download([oi]);
}
function downloadSelected(){
 if(!selected.size)return;
 if(batchRunning){showConflictDlg([...selected]);return}
 dlPlatform=activePlatform;
 window.go.main.App.Download([...selected].sort((a,b)=>a-b));
}
function confirmBatchDownload(){

 if(batchRunning){showConflictDlg([...selected]);return}
 document.getElementById('dlg-title').textContent=t('warn_title');
 document.getElementById('dlg-msg').textContent=t('warn_batch');
 document.querySelector('#dlg-batch .modal-cancel').textContent=t('btn_cancel');

}

window.runtime.EventsOn('dl_started',(data)=>{
 dl={index:data.index,status:'downloading',folder:data.folder,current:0,total:0,pct:0,file:''};
 batchRunning=true;
 if(activePlatform===dlPlatform){
  const item=document.getElementById('c'+data.index);
  if(item){item.classList.add('active-dl');item.classList.remove('downloaded-item','partial-item')}
  const pa=document.getElementById('pa'+data.index);if(pa)pa.classList.add('visible');
  updateAll();
 }
 syncDlToSession();
});

window.runtime.EventsOn('dl_progress',(data)=>{
 const filePct=data.percent||0;
 const overallPct=data.total>0?((Math.max(data.current-1,0)+(filePct/100))/data.total)*100:filePct;
 dl.index=data.index;dl.current=data.current;dl.total=data.total;
 dl.pct=overallPct;dl.file=data.filename;dl.status='downloading';
 if(activePlatform===dlPlatform){
  const bf=document.getElementById('bf'+data.index);
  const pt=document.getElementById('pt'+data.index);
  if(bf){bf.style.width=Math.min(overallPct,100)+'%';bf.className='minibar-fill'}
  if(pt)pt.textContent=(data.current||0)+'/'+data.total+' - '+data.filename;
 }
 syncDlToSession();
});

window.runtime.EventsOn('dl_complete',(data)=>{
 dl.status='idle';
 if(activePlatform===dlPlatform){
  const item=document.getElementById('c'+data.index);
  if(item){
   item.classList.remove('active-dl','partial-item');item.classList.add('downloaded-item');
   const old=item.querySelector('.badge-partial');
   if(old)old.outerHTML='<span class="badge-done">&#10003; '+t('downloaded')+'</span>';
   else if(!item.querySelector('.badge-done')){
    const meta=item.querySelector('.meta');
    if(meta)meta.insertAdjacentHTML('beforeend',' <span class="badge-done">&#10003; '+t('downloaded')+'</span>');
   }
  }
  const bf=document.getElementById('bf'+data.index);if(bf){bf.style.width='100%';bf.className='minibar-fill done'}
  const pt=document.getElementById('pt'+data.index);if(pt)pt.textContent=t('complete');
  const p=products.find(x=>x.oi===data.index);if(p){p.downloaded=true;p.dl_status='complete'}
  updateAll();
 }
 if(dlPlatform&&sessions[dlPlatform]){
  const sp=sessions[dlPlatform].products.find(x=>x.oi===data.index);if(sp){sp.downloaded=true;sp.dl_status='complete'}
 }
 syncDlToSession();
});

window.runtime.EventsOn('dl_error',(data)=>{
 dl.status='idle';
 if(activePlatform===dlPlatform){
  const item=document.getElementById('c'+data.index);if(item)item.classList.remove('active-dl');
  const bf=document.getElementById('bf'+data.index);if(bf){bf.style.width='100%';bf.className='minibar-fill cancelled'}
  const pt=document.getElementById('pt'+data.index);if(pt)pt.textContent=data.message||'Error';
  updateAll();
 }
 syncDlToSession();
});

window.runtime.EventsOn('dl_cancelled',(data)=>{
 dl.status='idle';
 if(activePlatform===dlPlatform){
  const item=document.getElementById('c'+data.index);if(item){item.classList.remove('active-dl');item.classList.add('partial-item')}
  const bf=document.getElementById('bf'+data.index);if(bf){bf.style.width='100%';bf.className='minibar-fill cancelled'}
  const pt=document.getElementById('pt'+data.index);if(pt)pt.textContent=t('cancelled');
  const p=products.find(x=>x.oi===data.index);if(p){p.dl_status='partial';p.downloaded=true}
  updateAll();
 }
 syncDlToSession();
});


window.runtime.EventsOn('batch_started',(data)=>{batchRunning=true;batchCount=data.count||1;syncDlToSession();updateSelBar()});
window.runtime.EventsOn('batch_progress',(data)=>{});
window.runtime.EventsOn('batch_done',(data)=>{
 batchRunning=false;batchCount=0;dl.status='idle';
 updateSelBar();
 if(activePlatform===dlPlatform)updateAll();
 if(dlPlatform&&sessions[dlPlatform])sessions[dlPlatform].dl={index:-1,status:'idle'};
 dlPlatform='';updateMiniDl();
});
window.runtime.EventsOn('folder_set',(data)=>{
 document.getElementById('folder-path').textContent=data.folder;
});
</script>
</body>
</html>
